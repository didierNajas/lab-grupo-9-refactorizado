    <div class="container full-screen-container">
        <div class="main-card">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block image-section">
                    </div>

                <div class="col-lg-6 col-md-12 form-section">
                    <h2>¡Hablemos!</h2>
                    <p class="text-muted mb-4">Envíanos un mensaje y te responderemos lo antes posible.</p>

                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label small fw-bold">NOMBRE COMPLETO</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold">CORREO ELECTRÓNICO</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@correo.com">
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label small fw-bold">MENSAJE</label>
                            <textarea id="mensaje" class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 mt-2">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
